name: COXA-CI-CD

on:
  push:
    branches:
      - master
    paths:
      # API source
      - "backend/**"
      # Backend workspace dependency (@coxa/rbac)
      - "packages/rbac/**"
      # Monorepo install + EB deploy config
      - "package.json"
      - "package-lock.json"
      - "Procfile"
      - ".ebextensions/**"
      - ".ebignore"
      - ".github/workflows/cicd.yml"

concurrency:
  group: coxa-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Build backend-only deployment package
    runs-on: ubuntu-latest
    outputs:
      version_label: ${{ steps.set_version.outputs.version_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set version label
        id: set_version
        run: echo "version_label=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Produces a slim zip containing only backend + shared packages.
      # Excludes all frontend apps, docs, and local env files.
      # NOTE: every file the Procfile references at runtime must be listed
      # here explicitly — `zip` only includes the paths it is given.
      - name: Generate backend-only deployment package
        run: |
          zip -r coxa-backend.zip \
            backend/ \
            packages/rbac/ \
            package.json \
            package-lock.json \
            Procfile \
            start.cjs \
            .ebextensions/ \
            -x "backend/node_modules/**" \
            -x "backend/src/openapi/write_spec.js" \
            -x "**/.env" \
            -x "**/.env.*" \
            -x ".git/**" \
            -x ".github/**" \
            -x "apps/**" \
            -x "docs/**"

      # Fail-fast sanity check: deploys are expensive and crash-loops are noisy,
      # so verify the zip actually contains the entry points the Procfile uses.
      - name: Verify deployment package contents
        run: |
          set -e
          for f in \
            start.cjs \
            Procfile \
            backend/src/cluster.js \
            backend/src/server.js \
            backend/src/lib/redis.js \
            package.json \
          ; do
            if ! unzip -l coxa-backend.zip | grep -qE " ${f}\$"; then
              echo "::error::Missing required file in coxa-backend.zip: ${f}"
              exit 1
            fi
          done
          echo "Deployment package contents OK."

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: coxa-backend
          path: coxa-backend.zip
          retention-days: 1

  deploy:
    name: Deploy to Elastic Beanstalk
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coxa-backend

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.COXA_AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.COXA_AWS_SECRET_ACCESS_KEY }}
          application_name: coxa-api
          environment_name: ${{ vars.EB_WEB_ENV_NAME || 'Coxa-api-env-1' }}
          version_label: ${{ needs.build-backend.outputs.version_label }}
          region: ${{ vars.AWS_REGION || 'us-east-1' }}
          deployment_package: coxa-backend.zip
          # Version label is the git SHA, so "exists" means "same code" — safe
          # to reuse. Makes the workflow idempotent on re-runs/retries.
          use_existing_version_if_available: true

